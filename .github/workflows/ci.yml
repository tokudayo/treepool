name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: CLI smoke test
        run: |
          swift build --product twt
          scripts/smoke-test.sh .build/debug/twt

  linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image:
          - swift:6.3.3-jammy
          - swift:6.3.3-bookworm
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: CLI smoke test
        run: |
          swift build --product twt
          scripts/smoke-test.sh .build/debug/twt
